<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Performance Diagnostic Intake</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #06131f;
      font-family: Arial, sans-serif;
    }

    .page-wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .banner {
      width: 100%;
      display: block;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.35);
      margin-bottom: 18px;
    }

    .form-wrap {
      width: 100%;
      background: transparent;
    }

    .form-frame {
      width: 100%;
      min-height: 1850px;
      border: 0;
      background: #ffffff;
      border-radius: 10px;
      display: block;
    }

    @media (max-width: 768px) {
      .page-wrap {
        padding: 10px 8px 18px;
      }

      .form-frame {
        min-height: 1950px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <img src="SECURITY_CHIPS.png" alt="Resume Performance Diagnostic banner" class="banner" />

    <div class="form-wrap">
      <iframe
        class="form-frame"
        src="https://docs.google.com/forms/d/e/1FAIpQLSdWv4Vr3jtriIPBg7ijVxsWzDgOi2SvLrMCK_Z-cDFQnUY6Hg/viewform?embedded=true"
        loading="lazy"
        marginheight="0"
        marginwidth="0"
      >
        Loading…
      </iframe>
    </div>
  </div>
</body>
</html>
