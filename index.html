<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resume Performance Diagnostic</title>

  <style>
    body{
      margin:0;
      padding-top:24px;
      padding-left:7px;
      padding-right:7px;
      padding-bottom:7px;
      background:#0b1b2b;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    /* Stage keeps the image aspect ratio so overlays never drift */
    .stage{
      position:relative;
      width:min(1100px,100%);
      aspect-ratio:1365 / 2048;
      margin:0 auto;
      background-image:url("Website%20Template.png"); /* <-- your main template image */
      background-size:cover;
      background-position:center top;
      background-repeat:no-repeat;
      border-radius:12px;
      overflow:hidden;
    }

    /* Hotspots (work for <a> or <button>) */
    .hotspot{
      position:absolute;
      display:block;
      background:transparent;
      border:0;
      padding:0;
      margin:0;
      border-radius:10px;
      cursor:pointer;

      /* HARD-KILL any accidental visible text rendering */
      font-size:0;
      line-height:0;
      color:transparent;
    }

    .hotspot:hover{
      outline:2px solid rgba(255,255,255,0.35);
      outline-offset:2px;
    }
    .hotspot:focus-visible{
      outline:3px solid rgba(255,255,255,0.65);
      outline-offset:3px;
    }

    /* Screen-reader label */
    .sr-only{
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    /* Diagnostic Framework popup */
    dialog#dfModal{
      border:none;
      padding:0;
      border-radius:12px;
      width:min(760px, 92vw);
      box-shadow:0 20px 60px rgba(0,0,0,0.45);
    }
    dialog#dfModal::backdrop{
      background:rgba(0,0,0,0.55);
    }
    .dfModalInner{
      position:relative;
      background:#ffffff;
      padding:16px;
    }
    .dfModalClose{
      position:absolute;
      top:10px;
      right:10px;
      border:0;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      background:#0b1b2b;
      color:#fff;
      font-weight:600;
      font-size:14px;
      line-height:1;
    }
    .dfImg{
      width:100%;
      height:auto;
      display:block;
      border-radius:10px;
    }
  </style>
</head>

<body>
  <div class="stage" role="img" aria-label="Resume Performance Diagnostic page design">

    <!-- DIAGNOSTIC FRAMEWORK (popup) -->
    <button class="hotspot"
            id="btnDiagnosticFramework"
            type="button"
            aria-haspopup="dialog"
            aria-label="Diagnostic Framework"
            style="
              left: 5.6410%;
              top: 24.8535%;
              width: 31.4286%;
              height: 2.9785%;
            ">
      <span class="sr-only">Diagnostic Framework</span>
    </button>

    <!-- VIEW SAMPLE REPORT (OPEN PDF IN NEW TAB) -->
    <!-- Using a BUTTON + JS prevents the “faint code line” issue entirely. -->
    <button class="hotspot"
            id="btnSampleReport"
            type="button"
            aria-label="View Sample Report"
            style="
              left: 66.8132%;
              top: 68.2129%;
              width: 21.0989%;
              height: 2.3438%;
            ">
      <span class="sr-only">View Sample Report</span>
    </button>

    <!-- SUBMIT RESUME (Google Form) -->
    <a class="hotspot"
       href="https://forms.gle/hCWXAvYTgk5oA7MY9"
       target="_blank"
       rel="noopener"
       aria-label="Submit Resume"
       style="
         left: 29.2308%;
         top: 71.8750%;
         width: 26.3004%;
         height: 3.8574%;
       ">
      <span class="sr-only">Submit Resume</span>
    </a>
        <!-- CONTACT EMAIL -->
    <a class="hotspot"
       href="mailto:leemills.resume@gmail.com"
       aria-label="Contact email"
       style="
         left: 2%;
         top: 93.6%;
         width: 32%;
         height: 1.8%;
       ">
      <span class="sr-only">Contact email</span>
    </a>
  </div>

  <!-- Diagnostic Framework modal -->
  <dialog id="dfModal" aria-label="Diagnostic Framework">
    <div class="dfModalInner">
      <button class="dfModalClose" type="button" id="dfCloseBtn">Close</button>
      <img class="dfImg" src="DIAGNOSTIC%20FRAMEWORK.png" alt="ATS and Recruiter Review Criteria" />
    </div>
  </dialog>

  <script>
    // DIAGNOSTIC FRAMEWORK popup
    const dfBtn = document.getElementById("btnDiagnosticFramework");
    const dfModal = document.getElementById("dfModal");
    const dfCloseBtn = document.getElementById("dfCloseBtn");

    dfBtn.addEventListener("click", () => {
      if (typeof dfModal.showModal === "function") dfModal.showModal();
      else alert("Your browser does not support <dialog>. Use a modern browser.");
    });

    dfCloseBtn.addEventListener("click", () => dfModal.close());

    // VIEW SAMPLE REPORT (open PDF in a new tab)
    const sampleBtn = document.getElementById("btnSampleReport");
    sampleBtn.addEventListener("click", () => {
      window.open("Sample%20Report.pdf", "_blank", "noopener");
    });
  </script>
</body>
</html>
